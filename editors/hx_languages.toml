[[language]]
name = "bash"
scope = "source.bash"
injection-regex = "(shell|bash|zsh|sh)"
file-types = [
  "sh",
  "bash",
  "ash",
  "dash",
  "ksh",
  "mksh",
  "zsh",
  "zshenv",
  "zlogin",
  "zlogout",
  "zprofile",
  "zshrc",
  "eclass",
  "ebuild",
  "bazelrc",
  "Renviron",
  "zsh-theme",
  "cshrc",
  "tcshrc",
  "bashrc_Apple_Terminal",
  "zshrc_Apple_Terminal",
  { glob = ".tmux.conf" },
  { glob = ".bash_history" },
  { glob = ".bash_login" },
  { glob = ".bash_logout" },
  { glob = ".bash_profile" },
  { glob = ".bashrc" },
  { glob = ".profile" },
  { glob = ".zshenv" },
  { glob = ".zlogin" },
  { glob = ".zlogout" },
  { glob = ".zprezto" },
  { glob = ".zprofile" },
  { glob = ".zshrc" },
  { glob = ".zimrc" },
  { glob = "APKBUILD" },
  { glob = ".bash_aliases" },
  { glob = ".Renviron" },
  { glob = ".xprofile" },
  { glob = ".xsession" },
  { glob = ".xsessionrc" },
  { glob = ".yashrc" },
  { glob = ".yash_profile" },
  { glob = ".hushlogin" },
]
shebangs = ["sh", "bash", "dash", "zsh"]
comment-token = "#"
language-servers = [ "bash-language-server" ]
indent = { tab-width = 2, unit = "  " }

[language-server.astral-ty]
command = "ty"
args= ["server"]

[[language]]
name = "python"
scope = "source.python"
auto-format = true
language-servers = [
  "ruff",
  "astral-ty",
]


[language-server.ruff]
command = "ruff-lsp"

[language-server.ruff.config.settings]
args = ["--ignore", "E501"]

# rust-analyzer runs `cargo check` in the background. By default it uses the
# SAME target dir as the terminal, and cargo takes an exclusive lock on it — so
# every save could block an interactive `cargo build`/`nextest` on "Blocking
# waiting for file lock on artifact directory". testq does not help here;
# rust-analyzer never goes through the queue.
#
# `targetDir = true` gives it its own `target/rust-analyzer` subdir. Per the
# rust-analyzer docs this "prevents rust-analyzer's cargo check and initial
# build-script/proc-macro building from locking Cargo.lock at the expense of
# duplicating build artifacts" — and on APFS that duplication is nearly free.
[language-server.rust-analyzer.config.cargo]
targetDir = true
