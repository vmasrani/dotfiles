name: Fast CI

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  fast:
    uses: __WORKFLOW_REPOSITORY__/.github/workflows/agent-fast.yml@__WORKFLOW_REF__
    secrets: inherit
    with:
      languages: __LANGUAGES__
      working-directory: __WORKING_DIRECTORY__
      just-recipe: __FAST_RECIPE__
