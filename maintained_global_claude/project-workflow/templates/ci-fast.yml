name: Fast CI

# Vendored, placeholder-free. Toolchain setup keys off what is actually in the
# tree, so one template serves every project and nothing needs rendering.

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  project-checks:
    name: Project checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    concurrency:
      group: agent-fast-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: hashFiles('**/Cargo.toml') != ''
      - uses: astral-sh/setup-uv@v6
        if: hashFiles('**/pyproject.toml') != ''
      - uses: actions/setup-node@v4
        if: hashFiles('**/package.json') != ''
        with:
          node-version: 22
      - uses: taiki-e/install-action@just
      - name: Run fast project checks
        run: just ci-fast

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The gitleaks CLI (MIT) is used directly rather than gitleaks-action.
      # The action is a thin wrapper that demands a GITLEAKS_LICENSE for any
      # ORGANIZATION-owned repo and hard-fails without one -- free, but behind a
      # signup and then a per-org secret. The scanner it wraps has no such
      # requirement. Dropping the wrapper removes a signup, a secret, and a
      # whole class of "red CI because nobody registered" from every project.
      # Pinned by version + checksum: an unpinned installer is itself a supply
      # chain hole in the job whose entire purpose is finding leaked secrets.
      - name: Install gitleaks
        env:
          VERSION: 8.30.1
          SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      # Scans FULL history (hence fetch-depth: 0), not just the diff. Exits 1 on
      # any finding -- no soft-fail, no report-and-continue.
      #
      # Expect false positives from `generic-api-key`, an entropy heuristic that
      # fires on high-entropy strings near words like key/token/secret -- test
      # fixtures and .env.example templates set it off routinely. Silence them
      # in a repo-root `.gitleaksignore`, which ignores AUDITED findings BY
      # FINGERPRINT (commit:file:rule:line), so a new secret in the same file
      # still fails. Do NOT reach for a path/rule allowlist in .gitleaks.toml:
      # `[[allowlists]] targetRules` was measured to swallow a planted AWS key
      # in an allowlisted path -- it mutes the path for EVERY rule, silently.
      #   gitleaks git --report-format json --report-path /tmp/gl.json .
      # then audit each finding before pasting its fingerprint.
      - name: Scan git history for secrets
        run: gitleaks git --no-banner --redact --exit-code 1 .

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
