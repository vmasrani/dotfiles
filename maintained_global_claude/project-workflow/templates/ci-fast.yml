name: Fast CI

# Vendored, placeholder-free. Toolchain setup keys off what is actually in the
# tree, so one template serves every project and nothing needs rendering.

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  # ADVISORY, not required. This job runs the project's own `just ci-fast` on
  # Linux -- the platform local macOS/Windows dev cannot cover -- but it does
  # NOT gate merges into dev (gh-setup requires only Secret scan + Workflow
  # lint there). The full suite gates the dev->main promotion instead, via
  # Deep integration checks in ci-deep.yml, so tests still guard main while a
  # feature PR never waits on a cold Linux build. Add "Project checks" to the
  # dev contexts in bin/project-workflow if you want it blocking.
  project-checks:
    name: Project checks
    runs-on: ubuntu-latest
    # A COLD build of a large Rust workspace does not fit in 12 min on a 2-core
    # runner and was cancelled mid-compile, which also meant rust-cache never
    # got to save -- so every run started cold and it could never go green. The
    # ceiling exists for that first cache-populating run; cached runs finish in
    # a fraction of it, and a small project never approaches it either way.
    timeout-minutes: 25
    concurrency:
      group: agent-fast-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      # MUST come after checkout. `hashFiles` globs the WORKSPACE, which is
      # empty until the checkout lands, so this same step placed above it
      # evaluated to '' and was silently skipped -- reported as a clean run
      # while doing nothing, and the build then died on a full disk anyway.
      #
      # A runner starts with only ~15 GB free of its 72 GB disk, and a debug
      # build of a large Rust workspace needs more -- MEASURED at ~24 GB here,
      # which filled the disk to 100% and killed the linker with
      # `ld terminated with signal 7 [Bus error]`. That is SIGBUS, not SIGKILL,
      # because lld writes its output through an mmap that cannot be extended:
      # it reads like a toolchain bug and is really ENOSPC. Dropping toolchains
      # no Rust build touches roughly doubles the space.
      #
      # Costs ~90s, so it is scoped to Rust projects. Delete it if your
      # workspace is small enough not to care.
      - name: Reclaim runner disk
        if: hashFiles('**/Cargo.toml') != ''
        run: |
          set -euo pipefail
          df -h /
          # NOT the tool cache -- the setup-* actions below populate it.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell
          df -h /
      - uses: dtolnay/rust-toolchain@stable
        if: hashFiles('**/Cargo.toml') != ''
      # cargo-nextest is the common Rust test runner and is NOT bundled with the
      # toolchain, so a `just test` that shells out to it dies with a bare
      # "error: no such command: `nextest`" -- a failure that says nothing about
      # the project. Installing it is a prebuilt-binary download of a few
      # seconds and is inert for projects that do not use it.
      - uses: taiki-e/install-action@nextest
        if: hashFiles('**/Cargo.toml') != ''
      # Caches ~/.cargo and target/ keyed on Cargo.lock + rustc version. The
      # first run is fully cold (nothing to restore) -- that is what the 25 min
      # ceiling above is for -- and saves the cache on success; later runs
      # restore it and skip recompiling unchanged dependencies, which is the
      # bulk of the time. It prunes stale artifacts before saving, so target/
      # does not grow without bound and re-open the disk problem.
      - uses: Swatinem/rust-cache@v2
        if: hashFiles('**/Cargo.toml') != ''
      - uses: astral-sh/setup-uv@v6
        if: hashFiles('**/pyproject.toml') != ''
      - uses: actions/setup-node@v4
        if: hashFiles('**/package.json') != ''
        with:
          node-version: 22
      - uses: taiki-e/install-action@just
      - name: Run fast project checks
        # Debug info is the single largest consumer of disk, RAM and link time
        # in a Rust CI build, and it is nearly worthless on a runner you cannot
        # attach a debugger to. A large workspace linking it into every test
        # binary killed the linker outright here:
        #   collect2: fatal error: ld terminated with signal 7 [Bus error]
        # `line-tables-only` keeps panic locations and backtrace line numbers --
        # the part anyone actually reads from a CI log -- and drops the rest.
        # Delete these two if a project genuinely needs full debug info in CI.
        env:
          CARGO_PROFILE_DEV_DEBUG: line-tables-only
          CARGO_PROFILE_TEST_DEBUG: line-tables-only
        run: just ci-fast
      # Runs even on failure: a build that dies in the linker looks identical
      # whether it ran the machine out of disk or not, and only this says which.
      - name: Disk after checks
        if: always()
        run: df -h /

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The gitleaks CLI (MIT) is used directly rather than gitleaks-action.
      # The action is a thin wrapper that demands a GITLEAKS_LICENSE for any
      # ORGANIZATION-owned repo and hard-fails without one -- free, but behind a
      # signup and then a per-org secret. The scanner it wraps has no such
      # requirement. Dropping the wrapper removes a signup, a secret, and a
      # whole class of "red CI because nobody registered" from every project.
      # Pinned by version + checksum: an unpinned installer is itself a supply
      # chain hole in the job whose entire purpose is finding leaked secrets.
      - name: Install gitleaks
        env:
          VERSION: 8.30.1
          SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      # Scans FULL history (hence fetch-depth: 0), not just the diff. Exits 1 on
      # any finding -- no soft-fail, no report-and-continue.
      #
      # Expect false positives from `generic-api-key`, an entropy heuristic that
      # fires on high-entropy strings near words like key/token/secret -- test
      # fixtures and .env.example templates set it off routinely. Silence them
      # in a repo-root `.gitleaksignore`, which ignores AUDITED findings BY
      # FINGERPRINT (commit:file:rule:line), so a new secret in the same file
      # still fails. Do NOT reach for a path/rule allowlist in .gitleaks.toml:
      # `[[allowlists]] targetRules` was measured to swallow a planted AWS key
      # in an allowlisted path -- it mutes the path for EVERY rule, silently.
      #   gitleaks git --report-format json --report-path /tmp/gl.json .
      # then audit each finding before pasting its fingerprint.
      - name: Scan git history for secrets
        run: gitleaks git --no-banner --redact --exit-code 1 .

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
