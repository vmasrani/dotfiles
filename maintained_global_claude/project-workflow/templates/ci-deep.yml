name: Deep CI

# Vendored, placeholder-free. Toolchain setup keys off what is actually in the
# tree, so one template serves every project and nothing needs rendering.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: Deep integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: agent-deep-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      # Same Rust-path setup as ci-fast.yml, and for the same measured reasons:
      # reclaim disk (a debug build fills the runner's ~15 GB free and SIGBUSes
      # the linker), install nextest (not bundled with the toolchain), cache
      # ~/.cargo + target/, and drop full debug info. This job runs the WHOLE
      # suite on the dev->main promotion, so it needs all of it. See ci-fast.yml
      # for the per-step rationale.
      - name: Reclaim runner disk
        if: hashFiles('**/Cargo.toml') != ''
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell
          df -h /
      - uses: dtolnay/rust-toolchain@stable
        if: hashFiles('**/Cargo.toml') != ''
      - uses: taiki-e/install-action@nextest
        if: hashFiles('**/Cargo.toml') != ''
      - uses: Swatinem/rust-cache@v2
        if: hashFiles('**/Cargo.toml') != ''
      - uses: astral-sh/setup-uv@v6
        if: hashFiles('**/pyproject.toml') != ''
      - uses: actions/setup-node@v4
        if: hashFiles('**/package.json') != ''
        with:
          node-version: 22
      - uses: taiki-e/install-action@just
      - name: Run deep project checks
        env:
          CARGO_PROFILE_DEV_DEBUG: line-tables-only
          CARGO_PROFILE_TEST_DEBUG: line-tables-only
        run: just ci-deep
      - name: Disk after checks
        if: always()
        run: df -h /
