name: Agent deep gate

on:
  workflow_call:
    inputs:
      languages:
        description: "Comma-separated enabled languages: rust,python,javascript"
        required: true
        type: string
      just-recipe:
        description: Project recipe implementing the deep gate
        default: ci-deep
        required: false
        type: string
      working-directory:
        description: Directory containing the project's justfile
        default: .
        required: false
        type: string

permissions:
  contents: read

jobs:
  integration:
    name: Deep integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: agent-deep-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: contains(inputs.languages, 'rust')
      - uses: astral-sh/setup-uv@v6
        if: contains(inputs.languages, 'python')
      - uses: actions/setup-node@v4
        if: contains(inputs.languages, 'javascript')
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - uses: taiki-e/install-action@just
      - name: Run deep project checks
        working-directory: ${{ inputs.working-directory }}
        run: just ${{ inputs.just-recipe }}
