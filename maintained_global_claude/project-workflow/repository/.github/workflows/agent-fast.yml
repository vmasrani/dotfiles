name: Agent fast gate

on:
  workflow_call:
    inputs:
      languages:
        description: "Comma-separated enabled languages: rust,python,javascript"
        required: true
        type: string
      just-recipe:
        description: Project recipe implementing the fast gate
        default: ci-fast
        required: false
        type: string
      working-directory:
        description: Directory containing the project's justfile
        default: .
        required: false
        type: string

permissions:
  contents: read

jobs:
  project-checks:
    name: Project checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    concurrency:
      group: agent-fast-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: contains(inputs.languages, 'rust')
      - uses: astral-sh/setup-uv@v6
        if: contains(inputs.languages, 'python')
      - uses: actions/setup-node@v4
        if: contains(inputs.languages, 'javascript')
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - uses: taiki-e/install-action@just
      - name: Run fast project checks
        working-directory: ${{ inputs.working-directory }}
        run: just ${{ inputs.just-recipe }}

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
